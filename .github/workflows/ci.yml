name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure npm network retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 120000
          npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          success=false
          for attempt in 1 2 3; do
            if npm ci --no-audit --fund=false; then
              success=true
              break
            fi
            echo "npm ci failed (attempt ${attempt}/3)."
          done

          if [ "$success" != "true" ]; then
            echo "npm ci failed after 3 attempts."
            exit 1
          fi

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          success=false
          for attempt in 1 2 3; do
            if python -m pip install --retries 5 --timeout 60 -r requirements-pipeline.txt; then
              success=true
              break
            fi
            echo "pip install failed (attempt ${attempt}/3)."
          done

          if [ "$success" != "true" ]; then
            echo "pip install failed after 3 attempts."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Robustness benchmark (quick)
        run: npm run benchmark:robustness:quick

      - name: Robustness gate (quick)
        run: npm run gate:robustness:quick

      - name: Build
        run: npm run build
