name: pedi-growth-backend
region: nyc
services:
  - name: backend
    github:
      repo: armageden/Pedi-Growth
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: Dockerfile.backend
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-2gb
    health_check:
      http_path: /health
      initial_delay_seconds: 60
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    envs:
      - key: PORT
        value: "8000"
        type: GENERAL
      - key: CORS_ALLOW_ORIGINS
        value: https://replace-with-frontend-domain.ondigitalocean.app
        type: GENERAL
